services:
  - type: web
    name: rakshak-backend
    runtime: node
    rootDir: backend/backend-node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_AGENT_URL
        fromService:
          name: rakshak-agent
          type: web
          property: host

  - type: web
    name: rakshak-agent
    runtime: python
    rootDir: backend/backend-python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TOMTOM_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"