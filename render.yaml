# Render Cloud Deployment Specification for Rakshak AI Microservices
services:
  # ── Python Agent — FastAPI + LangGraph (single backend) ──
  - type: web
    name: rakshak-agent
    runtime: python
    rootDir: backend/backend-python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TOMTOM_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"